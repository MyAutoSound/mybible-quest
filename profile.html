<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Profile — MyBible.quest</title>
  <meta name="description" content="Your reading streak, XP, badges, favorites, and personal notes — all stored privately on this device.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=%2224%22 height=%2224%22 rx=%226%22 fill=%22%231e3a5f%22/><text x=%2212%22 y=%2217%22 font-size=%2214%22 fill=%22white%22 text-anchor=%22middle%22 font-family=%22serif%22>Q</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="main-content">
    <section class="hero" style="padding-bottom:20px">
      <div class="container hero-inner">
        <span class="eyebrow reveal">✦ Your Profile</span>
        <h1 class="reveal">Your reading, your way.</h1>
        <p class="subtitle reveal">Everything here lives only in this browser — no account, nothing sent anywhere. Clear your browser data and it resets.</p>
      </div>
    </section>

    <section style="padding-top:0">
      <div class="container">
        <div class="study-card reveal is-visible level-card" id="level-card"></div>
      </div>
    </section>

    <section style="padding-top:0">
      <div class="container">
        <div class="stats-grid reveal is-visible" id="stats-grid"></div>
      </div>
    </section>

    <section>
      <div class="container">
        <div class="section-head reveal">
          <span class="eyebrow">Achievements</span>
          <h2>Badges</h2>
        </div>
        <div class="badge-grid reveal is-visible" id="badge-grid"></div>
      </div>
    </section>

    <section style="background:var(--bg-subtle)">
      <div class="container">
        <div class="grid grid-2">
          <div>
            <div class="section-head reveal" style="margin-bottom:20px">
              <span class="eyebrow">Saved</span>
              <h2>Favorite verses</h2>
            </div>
            <div id="favorites-list"></div>
          </div>
          <div>
            <div class="section-head reveal" style="margin-bottom:20px">
              <span class="eyebrow">Written</span>
              <h2>Your notes</h2>
            </div>
            <div id="notes-list-profile"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/store.js"></script>
  <script src="js/main.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
